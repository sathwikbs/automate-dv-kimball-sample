version: 2

models:
  - name: raw_customers
    columns:
      - name: CUSTOMER_ID
        tests:
          - not_null
      - name: LOAD_DATETIME
        tests:
          - not_null

  - name: raw_products
    columns:
      - name: PRODUCT_ID
        tests:
          - not_null
      - name: LOAD_DATETIME
        tests:
          - not_null

  - name: raw_orders
    columns:
      - name: ORDER_ID
        tests:
          - not_null
      - name: CUSTOMER_ID
        tests:
          - not_null
      - name: PRODUCT_ID
        tests:
          - not_null
      - name: LOAD_DATETIME
        tests:
          - not_null

  - name: raw_inventory
    columns:
      - name: PRODUCT_ID
        tests:
          - not_null
      - name: LOAD_DATETIME
        tests:
          - not_null

  - name: raw_promotions
    columns:
      - name: PRODUCT_ID
        tests:
          - not_null
      - name: CUSTOMER_ID
        tests:
          - not_null
      - name: LOAD_DATETIME
        tests:
          - not_null

  - name: raw_customer_accounts
    columns:
      - name: CUSTOMER_ID
        tests:
          - not_null
      - name: ACCOUNT_ID
        tests:
          - not_null
      - name: LOAD_DATETIME
        tests:
          - not_null

  - name: raw_shipments
    columns:
      - name: ORDER_ID
        tests:
          - not_null
      - name: LOAD_DATETIME
        tests:
          - not_null

  - name: raw_account_effectivity
    columns:
      - name: CUSTOMER_ID
        tests:
          - not_null
      - name: ACCOUNT_ID
        tests:
          - not_null
      - name: START_DATE
        tests:
          - not_null
      - name: END_DATE
        tests:
          - not_null

  - name: raw_customer_phones
    columns:
      - name: CUSTOMER_ID
        tests:
          - not_null
      - name: PHONE_TYPE
        tests:
          - not_null
      - name: LOAD_DATETIME
        tests:
          - not_null

  - name: raw_payments
    columns:
      - name: PAYMENT_ID
        tests:
          - not_null
      - name: ORDER_ID
        tests:
          - not_null
      - name: LOAD_DATETIME
        tests:
          - not_null

  - name: raw_country_codes
    columns:
      - name: COUNTRY_CODE
        tests:
          - not_null
          - unique
      - name: COUNTRY_NAME
        tests:
          - not_null

  - name: raw_customer_addresses
    columns:
      - name: CUSTOMER_ID
        tests:
          - not_null
      - name: LOAD_DATETIME
        tests:
          - not_null

  - name: raw_deliveries
    columns:
      - name: ORDER_ID
        tests:
          - not_null
      - name: LOAD_DATETIME
        tests:
          - not_null
